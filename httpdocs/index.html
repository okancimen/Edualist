<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <meta http-equiv="refresh" content="0;url=/tr/">
  <link rel="canonical" href="https://www.edualist.com/tr/">
  <link rel="alternate" hreflang="tr" href="https://www.edualist.com/tr/">
  <link rel="alternate" hreflang="en" href="https://www.edualist.com/en/">
  <link rel="alternate" hreflang="x-default" href="https://www.edualist.com/">
  <title>Edualist — Yönlendiriliyor / Redirecting…</title>
  <script>
    (function () {
      var lang = localStorage.getItem('edualist_lang');
      if (lang === 'en') { window.location.replace('/en/'); return; }
      if (lang === 'tr') { window.location.replace('/tr/'); return; }
      var bl = (navigator.language || navigator.userLanguage || '').toLowerCase();
      if (bl.startsWith('en')) {
        localStorage.setItem('edualist_lang', 'en');
        window.location.replace('/en/');
      } else {
        localStorage.setItem('edualist_lang', 'tr');
        window.location.replace('/tr/');
      }
    }());
  </script>
</head>
<body>
  <p style="font-family:sans-serif;text-align:center;margin-top:40vh;color:#555">
    Yönlendiriliyor… / Redirecting…
  </p>
</body>
</html>
