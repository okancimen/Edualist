<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edualist – International School Consulting & Parent-Student Coaching</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="alternate" hreflang="en" href="https://www.edualist.com/en/">
  <link rel="alternate" hreflang="tr" href="https://www.edualist.com/tr/">
  <link rel="alternate" hreflang="x-default" href="https://www.edualist.com/">
  <script>
    (function() {
      // Respect previously saved manual preference
      var saved = localStorage.getItem('edualist_lang');
      if (saved === 'tr' || saved === 'en') {
        window.location.replace(saved + '/');
        return;
      }
      // Auto-detect from browser language, fall back to English
      var browserLang = (navigator.languages && navigator.languages[0]) || navigator.language || 'en';
      var lang = browserLang.toLowerCase().startsWith('tr') ? 'tr' : 'en';
      window.location.replace(lang + '/');
    })();
  </script>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body { display:flex; align-items:center; justify-content:center; height:100vh; background:#f0f4f8; font-family:Arial,Helvetica,sans-serif; }
    .lang-select { display:flex; gap:2rem; }
    .lang-select a { padding:1rem 2rem; background:var(--accent,#0066ff); color:#fff; border-radius:0.5rem; text-decoration:none; font-size:1.2rem; transition:transform 0.2s; }
    .lang-select a:hover { transform:scale(1.05); }
  </style>
</head>
<body>
  <div class="lang-select">
    <a href="tr/" aria-label="Türkçe">Türkçe</a>
    <a href="en/" aria-label="English">English</a>
  </div>
</body>
</html>
